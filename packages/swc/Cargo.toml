[profile.release]
# This removes more dead code
codegen-units = 1
# TODO: enabling lto enables some optimizations to generate lightweighted wasm files
# but this causes problems on big source files, see https://github.com/swc-project/swc/issues/7429
# lto = true
# Optimize for size
opt-level = "s"
# Optimize for performance, this is default so you don't need to specify it
# opt-level = "z"

# Strip debug symbols
strip = "symbols"

[workspace]
members = ["plugins/*"]
resolver = "2"

[workspace.dependencies]
swc_common = { version = "18.0.1" }
swc_ecma_parser = { version = "33.0.1" }
if_chain = { version = "1.0.3" }
swc_ecma_visit = { version = "20.0.0" }
log = { version = "0.4" }
env_logger = { version = "0.11.8" }

[workspace.dependencies.swc_core]
version = "55.0.2"
features = [
  "ecma_plugin_transform",
  "ecma_utils",
  "ecma_visit",
  "ecma_ast",
  "common",
  "ecma_quote",
  "testing",
]
